<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg192)"/>
  <!-- neck -->
  <rect x="82" y="126" width="28" height="22" rx="8" fill="#F4C68A"/>
  <!-- shoulders / body -->
  <ellipse cx="96" cy="168" rx="52" ry="30" fill="#FF6B6B"/>
  <!-- collar detail -->
  <path d="M70 148 Q96 162 122 148" fill="#E05555"/>
  <!-- head -->
  <circle cx="96" cy="94" r="42" fill="#F4C68A"/>
  <!-- hair top -->
  <ellipse cx="96" cy="57" rx="42" ry="20" fill="#6B3A2A"/>
  <!-- hair sides -->
  <ellipse cx="58" cy="85" rx="10" ry="22" fill="#6B3A2A"/>
  <ellipse cx="134" cy="85" rx="10" ry="22" fill="#6B3A2A"/>
  <!-- hair ponytail bow -->
  <circle cx="96" cy="38" r="9" fill="#FF6B6B"/>
  <ellipse cx="82" cy="38" rx="9" ry="6" fill="#FF8E8E" transform="rotate(-30 82 38)"/>
  <ellipse cx="110" cy="38" rx="9" ry="6" fill="#FF8E8E" transform="rotate(30 110 38)"/>
  <!-- eyebrows -->
  <path d="M79 80 Q86 76 93 80" stroke="#6B3A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M99 80 Q106 76 113 80" stroke="#6B3A2A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- eyes white -->
  <ellipse cx="86" cy="90" rx="8" ry="9" fill="white"/>
  <ellipse cx="106" cy="90" rx="8" ry="9" fill="white"/>
  <!-- pupils -->
  <circle cx="87" cy="91" r="5" fill="#3A2010"/>
  <circle cx="107" cy="91" r="5" fill="#3A2010"/>
  <!-- eye shine -->
  <circle cx="89" cy="89" r="2" fill="white"/>
  <circle cx="109" cy="89" r="2" fill="white"/>
  <!-- nose -->
  <ellipse cx="96" cy="103" rx="4" ry="3" fill="#E0A870"/>
  <!-- smile -->
  <path d="M81 112 Q96 124 111 112" stroke="#C0784A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="75" cy="108" r="8" fill="#FFB6C1" opacity="0.55"/>
  <circle cx="117" cy="108" r="8" fill="#FFB6C1" opacity="0.55"/>
  <!-- star badge on body -->
  <polygon points="96,145 99,153 108,153 101,158 104,166 96,161 88,166 91,158 84,153 93,153" fill="#FFD700"/>
</svg>
